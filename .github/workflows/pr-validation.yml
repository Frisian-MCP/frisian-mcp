name: PR Validation

on:
  pull_request:
    branches: [main]

concurrency:
  group: pr-validation-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  validate:
    name: Lint, type-check, test & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --all-extras

      - name: Black (format check)
        run: uv run black --check src/ tests/

      - name: isort (import order check)
        run: uv run isort --check-only src/ tests/

      - name: Ruff (lint)
        run: uv run ruff check src/ tests/

      - name: Mypy (type check)
        run: uv run mypy src/frisian_mcp/

      - name: Pylint
        run: uv run pylint src/frisian_mcp/

      - name: Tests
        run: uv run pytest tests/ -q

      - name: Build wheel
        run: |
          uv pip install build setuptools wheel
          uv run python -m build --wheel --no-isolation
