<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Authorize — friese-mcp</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 480px; margin: 80px auto; padding: 0 1rem; color: #1a1a1a; }
    h1 { font-size: 1.25rem; margin-bottom: 0.5rem; }
    p  { color: #555; font-size: 0.9rem; margin-bottom: 1.5rem; }
    .actions { display: flex; gap: 0.75rem; }
    button { padding: 0.6rem 1.4rem; border: none; border-radius: 6px; font-size: 0.95rem; cursor: pointer; }
    .allow  { background: #2563eb; color: #fff; }
    .deny   { background: #e5e7eb; color: #1a1a1a; }
    .allow:hover { background: #1d4ed8; }
    .deny:hover  { background: #d1d5db; }
  </style>
</head>
<body>
  <h1>Authorize access</h1>
  <p>An application (<code>{{ client_id }}</code>) is requesting access to this MCP server.</p>
  <form method="post">
    {% csrf_token %}
    <input type="hidden" name="client_id"     value="{{ client_id }}">
    <input type="hidden" name="redirect_uri"  value="{{ redirect_uri }}">
    <input type="hidden" name="code_challenge" value="{{ code_challenge }}">
    <input type="hidden" name="state"          value="{{ state }}">
    <div class="actions">
      <button class="allow" type="submit" name="allow" value="true">Allow</button>
      <button class="deny"  type="submit" name="allow" value="false">Deny</button>
    </div>
  </form>
</body>
</html>
